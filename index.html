<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Film Club Scoring</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f4f4f4;
      color: #222;
    }
    h1, h2 { text-align: center; }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input, textarea, button, select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      background: #222;
      color: white;
      cursor: pointer;
      border: none;
      margin-top: 16px;
    }
    button:hover { background: #444; }
    .score-item {
      border-bottom: 1px solid #ddd;
      padding: 12px 0;
    }
    .average {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>🎬 Film Club Scoring</h1>

  <div class="card">
    <h2>This Week's Film</h2>
    <input type="text" id="filmTitle" placeholder="Enter film title" />
    <button onclick="saveFilmTitle()">Save Film</button>
    <p id="currentFilm"></p>
  </div>

  <div class="card">
    <h2>Submit Score</h2>
    <input type="text" id="name" placeholder="Your name" />
    <select id="score">
      <option value="">Score</option>
      <option>1</option><option>2</option><option>3</option>
      <option>4</option><option>5</option><option>6</option>
      <option>7</option><option>8</option><option>9</option>
      <option>10</option>
    </select>
    <textarea id="comment" placeholder="Comment"></textarea>
    <button onclick="submitScore()">Submit</button>
  </div>

  <div class="card">
    <h2>Results</h2>
    <div id="averageScore">Average Score: N/A</div>
    <div id="scoresList"></div>
  </div>

<script>
function getScores() {
  return JSON.parse(localStorage.getItem("scores")) || [];
}

function saveScores(scores) {
  localStorage.setItem("scores", JSON.stringify(scores));
}

function saveFilmTitle() {
  const title = document.getElementById("filmTitle").value;
  localStorage.setItem("film", title);
  document.getElementById("currentFilm").innerText = "Current Film: " + title;
}

function submitScore() {
  const name = document.getElementById("name").value;
  const score = document.getElementById("score").value;
  const comment = document.getElementById("comment").value;

  if (!name || !score) {
    alert("Enter name and score");
    return;
  }

  const scores = getScores();
  scores.push({name, score, comment});
  saveScores(scores);
  render();
}

function render() {
  const scores = getScores();
  const list = document.getElementById("scoresList");
  list.innerHTML = "";

  let total = 0;

  scores.forEach(s => {
    total += Number(s.score);
    list.innerHTML += `<p><strong>${s.name}</strong>: ${s.score}/10 - ${s.comment}</p>`;
  });

  if (scores.length > 0) {
    document.getElementById("averageScore").innerText =
      "Average Score: " + (total / scores.length).toFixed(1);
  }
}

render();
</script>

</body>
</html>
